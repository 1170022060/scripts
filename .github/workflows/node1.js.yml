name: Run Node Script

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f

      - name: Run script
        run: node ./m3u8_probe_linux.js

        
